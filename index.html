<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div id="calculator">
    <div class="row">
      <input type="text" id="input">
    </div>

    <div class="row">
      <button onclick="deleteMe()">C</button>
      <button onclick="calculator()">(</button>
      <button onclick="calculator()">)</button>
      <button onclick="calculator()">x</button>
    </div>

    <div class="row">
      <button onclick="calculator()">7</button>
      <button onclick="calculator()">8</button>
      <button onclick="calculator()">9</button>
      <button onclick="calculator()">+</button>
    </div>

    <div class="row">
      <button onclick="calculator()">4</button>
      <button onclick="calculator()">5</button>
      <button onclick="calculator()">6</button>
      <button onclick="calculator()">-</button>
    </div>

    <div class="row">
      <button onclick="calculator()">1</button>
      <button onclick="calculator()">2</button>
      <button onclick="calculator()">3</button>
      <button onclick="calculator()">*</button>
    </div>

    <div class="row">
      <button onclick="calculator()">0</button>
      <button onclick="calculator()">.</button>
      <button onclick="calculator()">/</button>
      <button onclick="answer()">=</button>
    </div>
  </div>
  <script src="./script.js"></script>
</body>

</html>
